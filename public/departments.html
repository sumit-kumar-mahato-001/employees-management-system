<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Department Management</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <nav class="navbar">
     <a href="dashboard.html" class="brand"> Manage Mate </a>
      <div class="nav-links">
        <a href="dashboard.html"> Dashboard </a>

        <a href="employees.html"> Employees </a>

        <a href="departments.html"> Departments </a>

        <button class="logout" id="logoutButton">Logout</button>
      </div>
    </nav>

    <main class="container">
      <section class="page-header">
        <div>
          <h1>Department Management</h1>

          <p>Add, view, edit and delete departments.</p>
        </div>
      </section>

      <div id="message" class="alert" hidden></div>

      <div class="department-layout">
        <section class="form-card">
          <h2 id="formTitle">Add Department</h2>

          <form id="departmentForm">
            <input type="hidden" id="oldDepartmentId" />

            <div id="departmentIdBox" hidden>
              <label for="departmentId"> Department ID </label>

              <input type="number" id="departmentId" min="1" />
            </div>

            <label for="departmentName"> Department Name </label>

            <input
              type="text"
              id="departmentName"
              placeholder="Enter department name"
              required
            />

            <button type="submit" id="submitButton">Add Department</button>

            <button type="button" class="secondary" id="cancelButton" hidden>
              Cancel
            </button>
          </form>
        </section>

        <section class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>

                <th>Department</th>

                <th>Employees</th>

                <th>Action</th>
              </tr>
            </thead>

            <tbody id="departmentTableBody"></tbody>
          </table>
        </section>
      </div>
    </main>

    <script src="js/common.js"></script>

    <script src="js/departments.js"></script>
  </body>
</html>
